<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="RadioHub">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://de1.api.radio-browser.info">
    <title>Global Radio Hub | AI Recommendation · Equalizer</title>
    <meta name="description" content="Global free radio aggregator with AI recommendations, professional equalizer, favorites and history. Listen worldwide.">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>🎙️ C.Q.Wang Radio Hub</h1>
        <div class="header-buttons">
            <button id="themeBtn" class="header-btn">🌓 Theme</button>
            <button id="favBtnTop" class="header-btn">⭐ My Favorites</button>
            <button id="historyBtnTop" class="header-btn">🕒 Play History</button>
        </div>
    </header>

    <!-- Main Navigation -->
    <div class="main-nav">
        <button class="main-nav-btn active" data-view="hot">🔥 Top Stations</button>
        <button class="main-nav-btn" data-view="all">📻 All Stations</button>
        <button class="main-nav-btn" data-view="type">🎸 By Genre</button>
        <button class="main-nav-btn" data-view="country">🌍 By Country</button>
        <button class="main-nav-btn" data-view="lang">🗣️ By Language</button>
    </div>

    <!-- Filters -->
    <div class="type-filter" id="typeFilter" style="display:none;">
        <button class="type-btn" data-tag="music">Music</button>
        <button class="type-btn" data-tag="pop">Pop</button>
        <button class="type-btn" data-tag="rock">Rock</button>
        <button class="type-btn" data-tag="jazz">Jazz</button>
        <button class="type-btn" data-tag="classical">Classical</button>
        <button class="type-btn" data-tag="talk">Talk</button>
        <button class="type-btn" data-tag="news">News</button>
    </div>
    <div class="country-filter" id="countryFilter" style="display:none;">
        <div id="countryBtnWrap"></div>
    </div>
    <div class="lang-filter" id="langFilter" style="display:none;">
        <div id="langBtnWrap"></div>
    </div>

    <!-- AI Recommendation Area -->
    <div id="aiRecommendBox" style="display:none; margin: 20px 0;">
        <div style="font-weight:bold; margin-bottom:8px;">🤖 Recommended for You · Based on listening history</div>
        <div id="aiRecommendList" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:8px;"></div>
    </div>

    <!-- Player + Equalizer -->
    <div class="player" id="playerCard">
        <h3 id="playTitle">✨ Select a station to start listening</h3>
        <audio id="audioPlayer" controls preload="none" crossorigin="anonymous"></audio>
        
        <!-- Equalizer Control Bar -->
        <div class="eq-panel">
            <button class="eq-btn active" data-eq="normal">🎵 Normal</button>
            <button class="eq-btn" data-eq="bass">🔊 Bass Boost</button>
            <button class="eq-btn" data-eq="vocal">🎙️ Vocal Clarity</button>
        </div>

        <!-- CSS Spectrum Visualizer -->
        <div class="spectrum-container" id="spectrumContainer" style="display: none;">
            <!-- 30 bars generated by JS -->
        </div>
    </div>

    <!-- Station List Container -->
    <div id="loadingTip" style="text-align:center;padding:15px;display:none;">⏳ Loading stations...</div>
    <div id="emptyTip" style="text-align:center;padding:20px;display:none;"></div>
    <div class="list-container" id="stationList"></div>

    <!-- Pagination Controls -->
    <div class="page-box" id="pageBox" style="display:none;">
        <button id="prevPage">← Previous</button>
        <span id="pageNum">Page 1</span>
        <button id="nextPage">Next →</button>
    </div>

    <footer class="footer">
        <p>This platform only provides radio directory, does not store audio streams. | Contact: wcqyt@163.com</p>
        <p><a href="privacy.html">Privacy & DMCA</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
