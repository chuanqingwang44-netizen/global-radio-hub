<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Radio Hub 全球电台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }
        body {
            padding: 12px;
            background: #fff;
            color: #222;
            transition: background 0.3s, color 0.3s;
        }
        html.dark body {
            background: #1a1a1a;
            color: #eee;
        }

        /* 导航按钮 */
        .main-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .main-nav-btn {
            padding: 8px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #f3f3f3;
            cursor: pointer;
            font-size: 14px;
        }
        .main-nav-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        html.dark .main-nav-btn {
            background: #2d2d2d;
            border-color: #444;
            color: #eee;
        }
        html.dark .main-nav-btn.active {
            background: #2563eb;
        }

        /* 顶部功能按钮 */
        .top-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }
        .top-buttons button {
            padding: 7px 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: #f3f3f3;
            cursor: pointer;
        }
        html.dark .top-buttons button {
            background: #2d2d2d;
            border-color: #444;
            color: #eee;
        }

        /* 搜索栏 */
        .search-box {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        #searchInput {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
        #searchBtn {
            padding: 0 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        html.dark #searchInput {
            background: #2d2d2d;
            border-color: #444;
            color: #fff;
        }

        /* 筛选容器通用 */
        #countryFilter, #langFilter, #typeFilter {
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
        }
        html.dark #countryFilter, html.dark #langFilter, html.dark #typeFilter {
            border-color: #444;
        }

        /* 国家按钮 */
        .country-btn {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            margin: 4px;
        }
        .country-btn:hover {
            background: #e0e0e0;
        }
        html.dark .country-btn {
            background: #333;
            color:#fff;
            border-color:#555;
        }

        /* 语言按钮 */
        .lang-btn {
            padding:6px 10px;
            margin:4px;
            border-radius:4px;
            border:1px solid #ccc;
            background:#f5f5f5;
            cursor:pointer;
        }
        html.dark .lang-btn {
            background:#333;
            color:#fff;
            border-color:#555;
        }

        /* 类型标签按钮 */
        .type-btn {
            padding:6px 10px;
            margin:4px;
            border-radius:4px;
            border:1px solid #ccc;
            background:#f5f5f5;
            cursor:pointer;
        }
        html.dark .type-btn {
            background:#333;
            color:#fff;
            border-color:#555;
        }

        /* 按钮包裹自动换行 */
        #countryBtnWrap, #langBtnWrap {
            display: flex;
            flex-wrap: wrap;
        }

        /* 分页 */
        #pageBox {
            display: flex;
            align-items: center;
            gap:10px;
            margin:12px 0;
        }
        #pageBox button {
            padding:6px 12px;
            border-radius:4px;
            border:1px solid #ccc;
            cursor:pointer;
        }
        html.dark #pageBox button {
            background:#2d2d2d;
            color:#fff;
            border-color:#444;
        }

        /* 电台列表项 */
        .station-list-wrap {
            margin-top:10px;
        }
        .station-item {
            border:1px solid #ddd;
            border-radius:8px;
            padding:12px;
            margin-bottom:8px;
            position:relative;
        }
        html.dark .station-item {
            border-color:#444;
        }
        .fav-card-btn {
            position:absolute;
            top:8px;
            right:8px;
            border:none;
            background:transparent;
            font-size:20px;
            cursor:pointer;
            color:#999;
        }
        .fav-card-btn.active {
            color:#f59e0b;
        }
        .station-item h4 {
            margin-bottom:6px;
            padding-right:30px;
        }
        .station-item p {
            font-size:14px;
            color:#555;
            margin:3px 0;
        }
        html.dark .station-item p {
            color:#bbb;
        }
        .station-item small {
            font-size:12px;
            color:#777;
        }
        html.dark .station-item small {
            color:#999;
        }

        /* 播放栏 */
        #playTitle {
            margin:10px 0 6px;
            font-weight:500;
        }
        audio {
            width:100%;
            margin-bottom:10px;
        }

        /* 加载、空提示 */
        #loadingTip, #emptyTip {
            text-align:center;
            padding:20px;
            font-size:15px;
            color:#666;
        }
        html.dark #loadingTip, html.dark #emptyTip {
            color:#aaa;
        }

        /* 弹窗模态框 */
        #memberModal {
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.6);
            align-items:center;
            justify-content:center;
            z-index:999;
        }
        .modal-box {
            background:#fff;
            padding:24px;
            border-radius:10px;
            min-width:320px;
            position:relative;
        }
        html.dark .modal-box {
            background:#222;
        }
        .closeModal {
            position:absolute;
            top:12px;
            right:16px;
            font-size:22px;
            cursor:pointer;
        }
        #paypal-button-container {
            margin-top:15px;
        }

        /* 会员去广告 */
        html.no-ad .ad-wrapper {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="main-nav">
        <button class="main-nav-btn active" data-view="hot">热门</button>
        <button class="main-nav-btn" data-view="all">全部电台</button>
        <button class="main-nav-btn" data-view="type">音乐类型</button>
        <button class="main-nav-btn" data-view="country">国家地区</button>
        <button class="main-nav-btn" data-view="lang">语言</button>
    </div>

    <!-- 收藏、历史、主题、会员按钮 -->
    <div class="top-buttons">
        <button id="favBtnTop">⭐ 我的收藏</button>
        <button id="historyBtnTop">🕒 播放历史</button>
        <button id="themeBtn">🌓 明暗切换</button>
        <button id="memberBtn">💎 无广告会员</button>
    </div>

    <!-- 搜索区域 -->
    <div class="search-box">
        <input id="searchInput" placeholder="输入电台/国家/语种搜索...">
        <button id="searchBtn">搜索</button>
    </div>

    <!-- 国家筛选面板 -->
    <div id="countryFilter">
        <input id="countrySearch" placeholder="快速搜索国家">
        <div id="countryBtnWrap"></div>
    </div>

    <!-- 语言筛选面板 -->
    <div id="langFilter">
        <div id="langBtnWrap"></div>
    </div>

    <!-- 音乐类型面板 -->
    <div id="typeFilter">
        <div class="type-btn-group">
            <button class="type-btn" data-tag="pop">流行 Pop</button>
            <button class="type-btn" data-tag="rock">摇滚 Rock</button>
            <button class="type-btn" data-tag="classical">古典 Classical</button>
            <button class="type-btn" data-tag="jazz">爵士 Jazz</button>
            <button class="type-btn" data-tag="chinese">华语 Chinese</button>
            <button class="type-btn" data-tag="dance">电子舞曲 Dance</button>
        </div>
    </div>

    <!-- 分页控件 -->
    <div id="pageBox">
        <button id="prevPage">上一页</button>
        <span id="pageNumText">第 1 页</span>
        <button id="nextPage">下一页</button>
    </div>

    <!-- 播放标题+播放器 -->
    <h3 id="playTitle">未播放任何电台</h3>
    <audio id="audioPlayer" controls>

    <!-- 电台列表容器 -->
    <div class="station-list-wrap" id="stationList"></div>

    <!-- 加载/空白提示 -->
    <div id="loadingTip" style="display: none;">正在加载电台数据...</div>
    <div id="emptyTip" style="display: none;"></div>

    <!-- 会员支付弹窗 -->
    <div id="memberModal">
        <div class="modal-box">
            <span class="closeModal">×</span>
            <h4>开通永久无广告会员 $1.99</h4>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <!-- 广告占位（演示用，开通会员自动隐藏） -->
    <div class="ad-wrapper" style="margin:15px 0;padding:10px;border:1px dashed #aaa;text-align:center;">广告位</div>

    <script>
// ========== 全局配置常量区（统一管理） ==========
const CONFIG = {
  API_MIRRORS: [
    "https://de1.api.radio-browser.info/json",
    "https://nl1.api.radio-browser.info/json",
    "https://fr1.api.radio-browser.info/json",
    "https://us1.api.radio-browser.info/json"
  ],
  UA_LIST: [
    "GlobalRadioHub/1.0 (Contact: wcqyt@163.com)",
    "RadioHubWeb/1.0 (Contact: wcqyt@163.com)",
    "GlobalFMHub/1.0 (Contact: wcqyt@163.com)"
  ],
  BLOCK_WORDS: ["bbc", "voa", "rfa", "radio free asia", "cnn news", "nhk world news"],
  PAGE_SIZE: 60,
  HIST_MAX: 50,
  CACHE_EXPIRE: 86400000, // 24小时缓存毫秒
  FETCH_TIMEOUT: 8000,
  LOCK_COOLDOWN: 1000,
  PAYPAL_MAX_RETRY: 8,
  STORAGE_KEYS: {
    FAV: "radio_favorites",
    HIST: "radio_history",
    THEME: "radio_theme",
    MEMBER: "radio_member",
    COUNTRY_CACHE: "radio_country_cache"
  }
};

// 运行时变量
let currentMirrorIndex = 0;
let fetchLock = false;
const state = {
  currentPage: 1,
  nowView: "hot",
  fullCountryList: [],
  paypalRetries: 0
};

// ==================== 工具函数 ====================
/** 随机UA */
function getRandomUA() {
  return CONFIG.UA_LIST[Math.floor(Math.random() * CONFIG.UA_LIST.length)];
}
const fetchBaseOpts = {
  headers: { "User-Agent": getRandomUA() }
};

/** 多镜像轮询请求 */
async function fetchWithFallback(urlPath, options = {}) {
  const opts = { ...fetchBaseOpts, ...options };
  const mirrors = CONFIG.API_MIRRORS;

  for (let i = 0; i < mirrors.length; i++) {
    const idx = (currentMirrorIndex + i) % mirrors.length;
    const mirror = mirrors[idx];
    const fullUrl = mirror + urlPath;
    try {
      const res = await fetch(fullUrl, opts);
      if (res.ok) {
        currentMirrorIndex = idx; // 记录可用镜像优先下次使用
        return res;
      }
      console.warn(`镜像 ${mirror} 返回非200状态: ${res.status}`);
    } catch (err) {
      console.warn(`镜像 ${mirror} 连接失败:`, err.message);
    }
  }
  throw new Error("所有Radio Browser镜像服务器均连接失败");
}

/** 带锁+超时+兜底数组的安全请求 */
async function safeFetch(urlPath, options = {}) {
  if (fetchLock) return [];
  fetchLock = true;
  try {
    // 超时竞速
    const fetchPromise = fetchWithFallback(urlPath, options);
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error("请求超时")), CONFIG.FETCH_TIMEOUT)
    );
    const res = await Promise.race([fetchPromise, timeoutPromise]);
    const raw = await res.json();
    return Array.isArray(raw) ? raw : [];
  } catch (err) {
    console.error("safeFetch异常:", err);
    showEmptyTip("网络请求失败，无法加载电台数据");
    return [];
  } finally {
    // 冷却解锁，防止短时间并发轰炸接口
    setTimeout(() => fetchLock = false, CONFIG.LOCK_COOLDOWN);
  }
}

/** HTML转义防XSS */
function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/** 防抖封装 */
function debounce(fn, delay = 300) {
  let timer = null;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

/** 电台过滤屏蔽名单 */
function isSafeStation(item) {
  if (!item?.url) return false;
  const urlLow = item.url.toLowerCase();
  return !CONFIG.BLOCK_WORDS.some(word => urlLow.includes(word));
}

// ==================== LocalStorage安全读写封装 ====================
function storageGet(key) {
  try {
    return localStorage.getItem(key);
  } catch { return null; }
}
function storageSet(key, val) {
  try {
    localStorage.setItem(key, val);
  } catch {}
}
function storageGetJSON(key) {
  const str = storageGet(key);
  if (!str) return null;
  try { return JSON.parse(str); } catch { return null; }
}
function storageSetJSON(key, obj) {
  storageSet(key, JSON.stringify(obj));
}

// ==================== 收藏逻辑 ====================
function getFavorites() {
  return storageGetJSON(CONFIG.STORAGE_KEYS.FAV) || [];
}
function saveFavorites(list) {
  storageSetJSON(CONFIG.STORAGE_KEYS.FAV, list);
}
function isFav(uuid) {
  return getFavorites().some(s => s.stationuuid === uuid);
}
function toggleFav(stationObj) {
  const favs = getFavorites();
  const idx = favs.findIndex(s => s.stationuuid === stationObj.stationuuid);
  if (idx > -1) favs.splice(idx, 1);
  else favs.push(stationObj);
  saveFavorites(favs);
  return idx === -1;
}
function loadFavList() {
  hideAllFilter();
  const favs = getFavorites();
  if (!favs.length) return showEmptyTip("暂无收藏电台，点击卡片☆添加收藏");
  renderStationList(favs);
}

// ==================== 播放历史逻辑 ====================
function getHistory() {
  return storageGetJSON(CONFIG.STORAGE_KEYS.HIST) || [];
}
function saveHistory(list) {
  storageSetJSON(CONFIG.STORAGE_KEYS.HIST, list);
}
function addHistory(stationObj) {
  let hist = getHistory().filter(s => s.stationuuid !== stationObj.stationuuid);
  hist.unshift(stationObj);
  if (hist.length > CONFIG.HIST_MAX) hist.pop();
  saveHistory(hist);
}
function loadHistoryList() {
  hideAllFilter();
  const hist = getHistory();
  if (!hist.length) return showEmptyTip("暂无播放历史记录");
  renderStationList(hist);
}

// ==================== 主题/会员广告 ====================
function isMember() {
  return storageGet(CONFIG.STORAGE_KEYS.MEMBER) === "paid";
}
function setMemberPaid() {
  storageSet(CONFIG.STORAGE_KEYS.MEMBER, "paid");
  document.documentElement.classList.add("no-ad");
}
function initAdState() {
  if (isMember()) document.documentElement.classList.add("no-ad");
}
function initTheme() {
  const saved = storageGet(CONFIG.STORAGE_KEYS.THEME) || "light";
  const adCls = isMember() ? " no-ad" : "";
  document.documentElement.className = saved + adCls;
}
function toggleTheme() {
  const html = document.documentElement;
  const adCls = html.classList.contains("no-ad") ? " no-ad" : "";
  const newTheme = html.classList.contains("light") ? "dark" : "light";
  html.className = newTheme + adCls;
  storageSet(CONFIG.STORAGE_KEYS.THEME, newTheme);
}

// ==================== DOM节点缓存 ====================
const dom = {
  searchInput: document.getElementById("searchInput"),
  searchBtn: document.getElementById("searchBtn"),
  stationList: document.getElementById("stationList"),
  audioPlayer: document.getElementById("audioPlayer"),
  playTitle: document.getElementById("playTitle"),
  favBtnTop: document.getElementById("favBtnTop"),
  historyBtnTop: document.getElementById("historyBtnTop"),
  themeBtn: document.getElementById("themeBtn"),
  memberBtn: document.getElementById("memberBtn"),
  loadingTip: document.getElementById("loadingTip"),
  emptyTip: document.getElementById("emptyTip"),
  modal: document.getElementById("memberModal"),
  closeModal: document.querySelector(".closeModal"),
  paypalWrap: document.getElementById("paypal-button-container"),
  mainNavBtns: document.querySelectorAll(".main-nav-btn"),
  typeFilter: document.getElementById("typeFilter"),
  typeBtns: document.querySelectorAll(".type-btn"),
  countryFilter: document.getElementById("countryFilter"),
  countryBtnWrap: document.getElementById("countryBtnWrap"),
  countrySearchInput: document.getElementById("countrySearch"),
  langFilter: document.getElementById("langFilter"),
  langBtnWrap: document.getElementById("langBtnWrap"),
  pageBox: document.getElementById("pageBox"),
  prevPage: document.getElementById("prevPage"),
  nextPage: document.getElementById("nextPage"),
  pageNumText: document.getElementById("pageNumText"),
  adWrappers: document.querySelectorAll(".ad-wrapper")
};

// ==================== UI状态控制 ====================
function showLoading() {
  dom.loadingTip.style.display = "block";
  dom.emptyTip.style.display = "none";
}
function hideLoading() {
  dom.loadingTip.style.display = "none";
}
function showEmptyTip(text) {
  dom.emptyTip.textContent = text;
  dom.emptyTip.style.display = "block";
  dom.stationList.innerHTML = "";
}
function hideAllFilter() {
  dom.pageBox.style.display = "none";
  dom.typeFilter.style.display = "none";
  dom.countryFilter.style.display = "none";
  dom.langFilter.style.display = "none";
}
function updatePageText() {
  dom.pageNumText.textContent = `第 ${state.currentPage} 页`;
}

// ==================== 电台列表渲染 ====================
function renderStationList(rawList) {
  dom.stationList.innerHTML = "";
  dom.emptyTip.style.display = "none";
  const safeList = rawList.filter(isSafeStation);

  if (!safeList.length) return showEmptyTip("筛选后无可用电台，请更换分类/关键词");

  safeList.forEach(station => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "station-item";
    const faved = isFav(station.stationuuid);

    itemDiv.innerHTML = `
      <button class="fav-card-btn ${faved ? 'active' : ''}" data-uuid="${escapeHtml(station.stationuuid)}">
        ${faved ? '★' : '☆'}
      </button>
      <h4>${escapeHtml(station.name)}</h4>
      <p>国家: ${escapeHtml(station.country || "未知")}</p>
      <p>语言: ${escapeHtml(station.language || "未知")}</p>
      <small>标签: ${escapeHtml((station.tags || "").slice(0, 60))}</small>
    `;
    itemDiv.dataset.station = JSON.stringify(station);
    dom.stationList.appendChild(itemDiv);
  });

  // 卡片委托点击
  dom.stationList.onclick = (e) => {
    const item = e.target.closest(".station-item");
    if (!item) return;
    const favBtn = e.target.closest(".fav-card-btn");
    const station = JSON.parse(item.dataset.station);

    if (favBtn) {
      e.stopPropagation();
      const newFav = toggleFav(station);
      favBtn.textContent = newFav ? "★" : "☆";
      favBtn.classList.toggle("active", newFav);
      return;
    }
    playStation(station);
  };
}

/** 播放电台 */
async function playStation(station) {
  dom.audioPlayer.pause();
  dom.audioPlayer.src = "";
  dom.audioPlayer.load();
  dom.playTitle.innerText = "加载中...";

  try {
    dom.playTitle.innerText = escapeHtml(station.name);
    dom.audioPlayer.src = station.url;
    await dom.audioPlayer.play();
    addHistory(station);
  } catch (err) {
    dom.playTitle.innerText = "播放失败，该流地址失效";
    console.error("播放错误:", err);
  }
}

// ==================== 国家列表逻辑（修复版） ====================
// 备用完整国名映射（code: 完整名称）
const COUNTRY_NAME_MAP = {
  US: "United States", GB: "United Kingdom", CA: "Canada", AU: "Australia",
  DE: "Germany", FR: "France", IT: "Italy", ES: "Spain", JP: "Japan",
  CN: "China", IN: "India", BR: "Brazil", MX: "Mexico", NL: "Netherlands",
  SE: "Sweden", NO: "Norway", PL: "Poland", RU: "Russia"
};
// 兜底备用数据（code结构，和API一致）
const FALLBACK_COUNTRIES_RAW = Object.keys(COUNTRY_NAME_MAP).map(code => ({
  name: code,
  stationcount: 0
}));

async function loadCachedCountries() {
  const cache = storageGetJSON(CONFIG.STORAGE_KEYS.COUNTRY_CACHE);
  // 缓存有效直接渲染
  if (cache && Date.now() - cache.time < CONFIG.CACHE_EXPIRE) {
    state.fullCountryList = cache.data;
    renderCountryButtons(state.fullCountryList);
    bindCountrySearch();
    return;
  }

  // 请求 /countries 接口（返回 code 数组）
  let data = await safeFetch("/countries");
  let useFallback = false;

  // 接口空/失败启用兜底
  if (!Array.isArray(data) || data.length === 0) {
    useFallback = true;
    data = FALLBACK_COUNTRIES_RAW;
  }

  state.fullCountryList = data;
  // 写入缓存
  storageSetJSON(CONFIG.STORAGE_KEYS.COUNTRY_CACHE, { time: Date.now(), data });

  renderCountryButtons(data);
  bindCountrySearch();

  if (useFallback) {
    showEmptyTip("服务器国家列表拉取失败，使用内置备用列表");
  }
}

function renderCountryButtons(list) {
  dom.countryBtnWrap.innerHTML = "";
  if (!list || list.length === 0) {
    dom.countryBtnWrap.innerHTML = "<p style='padding:10px;text-align:center'>无国家数据</p>";
    return;
  }

  list.forEach(ct => {
    const countryCode = ct.name?.toUpperCase() || "";
    const fullName = COUNTRY_NAME_MAP[countryCode] || countryCode;
    const count = ct.stationcount ?? 0;

    const btn = document.createElement("button");
    btn.className = "country-btn";
    // 显示：完整名称(数量)
    btn.textContent = `${escapeHtml(fullName)} (${count})`;
    // 存code和全名，点击优先用code查询（API精准匹配）
    btn.dataset.code = countryCode;
    btn.dataset.fullname = fullName;

    btn.onclick = () => loadByCountry(countryCode, fullName);
    dom.countryBtnWrap.appendChild(btn);
  });
}

/** 绑定国家搜索过滤（修复：匹配code+全名） */
function bindCountrySearch() {
  if (!dom.countrySearchInput) return;
  const filterCountry = debounce((kw) => {
    const keyLow = kw.toLowerCase().trim();
    const filtered = state.fullCountryList.filter(c => {
      const code = c.name?.toLowerCase() || "";
      const full = COUNTRY_NAME_MAP[c.name?.toUpperCase()]?.toLowerCase() || "";
      return code.includes(keyLow) || full.includes(keyLow);
    });
    renderCountryButtons(filtered);
  }, 250);
  dom.countrySearchInput.oninput = (e) => filterCountry(e.target.value);
}

// 加载国家电台：优先用code精准查询，兜底全名模糊
async function loadByCountry(countryCode, displayName) {
  showLoading();
  hideAllFilter();
  dom.countryFilter.style.display = "flex";

  let stations = [];
  // 1. 优先用countrycode精准匹配（官方推荐，最准）
  if (countryCode) {
    stations = await safeFetch(`/stations/bycountrycodeexact/${encodeURIComponent(countryCode)}?limit=120`);
  }
  // 2. 精准没数据，用name模糊搜索
  if (!stations.length && displayName) {
    stations = await safeFetch(`/stations/search?country=${encodeURIComponent(displayName)}&limit=120`);
  }
  // 3. 二次兜底：全量热门里筛选
  if (!stations.length) {
    const topAll = await safeFetch("/stations/topclick/500");
    const matchText = (displayName || countryCode).toLowerCase();
    stations = topAll.filter(s => (s.country || "").toLowerCase().includes(matchText));
  }

  if (!stations.length) {
    showEmptyTip(`未找到「${displayName || countryCode}」相关电台`);
    hideLoading();
    return;
  }
  renderStationList(stations);
  hideLoading();
}

// ==================== 语言筛选 ====================
const MAJOR_LANGUAGES = [
  { name: "English", code: "en", keywords: ["english", "en"] },
  { name: "Chinese", code: "zh", keywords: ["chinese", "zh", "chi", "zho"] },
  { name: "Spanish", code: "es", keywords: ["spanish", "es"] },
  { name: "French", code: "fr", keywords: ["french", "fr"] },
  { name: "German", code: "de", keywords: ["german", "de"] },
  { name: "Japanese", code: "ja", keywords: ["japanese", "ja"] },
  { name: "Korean", code: "ko", keywords: ["korean", "ko"] },
  { name: "Arabic", code: "ar", keywords: ["arabic", "ar"] },
  { name: "Russian", code: "ru", keywords: ["russian", "ru"] },
  { name: "Portuguese", code: "pt", keywords: ["portuguese", "pt"] },
  { name: "Italian", code: "it", keywords: ["italian", "it"] }
];

function renderLanguageButtons() {
  dom.langBtnWrap.innerHTML = "";
  const displayMap = {
    English: "🇬🇧 English (英语)",
    Chinese: "🇨🇳 Chinese (汉语)",
    Spanish: "🇪🇸 Spanish (西班牙语)",
    French: "🇫🇷 French (法语)",
    German: "🇩🇪 German (德语)",
    Japanese: "🇯🇵 Japanese (日语)",
    Korean: "🇰🇷 Korean (韩语)",
    Arabic: "🇸🇦 Arabic (阿拉伯语)",
    Russian: "🇷🇺 Russian (俄语)",
    Portuguese: "🇵🇹 Portuguese (葡萄牙语)",
    Italian: "🇮🇹 Italian (意大利语)"
  };
  MAJOR_LANGUAGES.forEach(lang => {
    const btn = document.createElement("button");
    btn.className = "lang-btn";
    btn.textContent = displayMap[lang.name];
    btn.dataset.lang = lang.name;
    btn.dataset.code = lang.code;
    btn.onclick = () => loadByLanguage(lang);
    dom.langBtnWrap.appendChild(btn);
  });
}

async function loadByLanguage(lang) {
  showLoading();
  hideAllFilter();
  dom.langFilter.style.display = "flex";

  let stations = [];
  const queries = new Set();
  queries.add(`language=${encodeURIComponent(lang.name)}`);
  queries.add(`language=${encodeURIComponent(lang.name.toLowerCase())}`);
  queries.add(`language=${encodeURIComponent(lang.code)}`);
  queries.add(`languagecode=${encodeURIComponent(lang.code)}`);
  lang.keywords.forEach(kw => queries.add(`language=${encodeURIComponent(kw)}`));

  for (const q of queries) {
    const res = await safeFetch(`/stations/search?${q}&limit=120`);
    if (res.length) {
      stations = res;
      break;
    }
  }

  // 兜底筛选
  if (!stations.length) {
    const topAll = await safeFetch("/stations/topclick/500");
    const kwLow = lang.keywords.map(k => k.toLowerCase());
    stations = topAll.filter(s => {
      const l = (s.language || "").toLowerCase();
      return kwLow.some(w => l.includes(w));
    });
  }

  if (!stations.length) {
    showEmptyTip(`未找到 ${lang.name} 语言电台`);
    hideLoading();
    return;
  }
  renderStationList(stations);
  hideLoading();
}

// ==================== 分类/分页/热门 ====================
async function loadHot() {
  showLoading();
  hideAllFilter();
  const data = await safeFetch("/stations/topclick/100");
  renderStationList(data);
  hideLoading();
}

async function loadAllStations() {
  showLoading();
  hideAllFilter();
  dom.pageBox.style.display = "flex";
  const offset = (state.currentPage - 1) * CONFIG.PAGE_SIZE;
  const data = await safeFetch(`/stations?limit=${CONFIG.PAGE_SIZE}&offset=${offset}`);
  renderStationList(data);
  updatePageText();
  hideLoading();
}

async function loadByTag(tag) {
  showLoading();
  hideAllFilter();
  dom.typeFilter.style.display = "flex";
  const data = await safeFetch(`/stations/search?tag=${encodeURIComponent(tag)}&limit=120`);
  renderStationList(data);
  hideLoading();
}

// ==================== 搜索（重构复用safeFetch） ====================
const handleSearch = debounce(async () => {
  const q = dom.searchInput.value.trim();
  if (!q) {
    showEmptyTip("请输入搜索关键词");
    return;
  }
  showLoading();
  hideAllFilter();
  dom.pageBox.style.display = "none";

  const data = await safeFetch(`/stations/search?q=${encodeURIComponent(q)}&limit=100`);
  if (!data.length) {
    showEmptyTip(`无匹配电台：${q}`);
    hideLoading();
    return;
  }
  renderStationList(data);
  hideLoading();
});

// 清空输入框自动回热榜
dom.searchInput.addEventListener("input", debounce(() => {
  if (dom.searchInput.value.trim() === "" && state.nowView !== "hot") {
    state.nowView = "hot";
    dom.mainNavBtns.forEach(b => b.classList.toggle("active", b.dataset.view === "hot"));
    loadHot();
  }
}, 400));

// ==================== PayPal会员支付 ====================
function loadPayPalSDK() {
  if (document.querySelector('#paypal-sdk')) return;
  const script = document.createElement('script');
  script.id = 'paypal-sdk';
  // 替换为你自己的ClientID
  script.src = 'https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD';
  script.defer = true;
  document.head.appendChild(script);
}

function initPayPal() {
  state.paypalRetries++;
  if (state.paypalRetries > CONFIG.PAYPAL_MAX_RETRY) {
    dom.memberBtn.style.display = "none";
    return;
  }
  if (typeof paypal === "undefined") {
    loadPayPalSDK();
    setTimeout(initPayPal, 800);
    return;
  }
  // 清空防止重复渲染按钮
  dom.paypalWrap.innerHTML = "";
  paypal.Buttons({
    createOrder: (_, actions) => actions.order.create({
      purchase_units: [{ amount: { value: "1.99" } }]
    }),
    onApprove: async (_, actions) => {
      try {
        await actions.order.capture();
        setMemberPaid();
        alert("支付成功！刷新页面永久去除广告");
        location.reload();
      } catch (err) {
        alert("支付校验失败，请刷新重试");
        console.error("PayPal capture error:", err);
      }
    },
    onError: () => {
      if (state.paypalRetries > 4) dom.memberBtn.style.display = "none";
    }
  }).render(dom.paypalWrap);
}

// ==================== 事件绑定 ====================
function bindModalEvent() {
  dom.memberBtn.onclick = () => dom.modal.style.display = "flex";
  dom.closeModal.onclick = () => dom.modal.style.display = "none";
  window.onclick = (e) => { if (e.target === dom.modal) dom.modal.style.display = "none"; };
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && dom.modal.style.display === "flex") dom.modal.style.display = "none";
  });
}

function bindNavEvents() {
  dom.mainNavBtns.forEach(btn => {
    btn.onclick = async () => {
      dom.mainNavBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.nowView = btn.dataset.view;
      state.currentPage = 1;

      switch (state.nowView) {
        case "hot": await loadHot(); break;
        case "all": await loadAllStations(); break;
        case "type":
          hideAllFilter();
          dom.typeFilter.style.display = "flex";
          showEmptyTip("点击下方标签筛选类型");
          break;
        case "country":
          hideAllFilter();
          dom.countryFilter.style.display = "flex";
          showEmptyTip("搜索/点击国家加载电台");
          await loadCachedCountries();
          break;
        case "lang":
          hideAllFilter();
          dom.langFilter.style.display = "flex";
          renderLanguageButtons();
          showEmptyTip("点击语言筛选电台");
          break;
      }
    };
  });
}

function bindPageEvents() {
  dom.prevPage.onclick = async () => {
    if (state.nowView !== "all" || state.currentPage <= 1) return;
    state.currentPage--;
    await loadAllStations();
  };
  dom.nextPage.onclick = async () => {
    if (state.nowView !== "all") return;
    state.currentPage++;
    await loadAllStations();
  };
}

function bindVisibilityPause() {
  // 切后台暂停播放
  document.addEventListener("visibilitychange", () => {
    if (document.hidden && !dom.audioPlayer.paused) dom.audioPlayer.pause();
  });
  // 关闭页面前销毁音频
  window.addEventListener('beforeunload', () => {
    dom.audioPlayer.pause();
    dom.audioPlayer.src = "";
  });
}

function bindAllEvents() {
  dom.favBtnTop.onclick = loadFavList;
  dom.historyBtnTop.onclick = loadHistoryList;
  dom.themeBtn.onclick = toggleTheme;
  dom.searchBtn.onclick = handleSearch;
  dom.searchInput.addEventListener("keydown", e => e.key === "Enter" && handleSearch());
  dom.typeBtns.forEach(btn => btn.onclick = () => loadByTag(btn.dataset.tag));

  bindNavEvents();
  bindPageEvents();
  bindModalEvent();
  bindVisibilityPause();
}

// ==================== 应用入口 ====================
async function initApp() {
  initTheme();
  initAdState();
  bindAllEvents();
  await loadHot();
  setTimeout(initPayPal, 1200);
}

window.addEventListener("DOMContentLoaded", initApp);
    </script>
